services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: rothar
      POSTGRES_PASSWORD: rothar_dev
      POSTGRES_DB: rothar_db
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rothar"]
      interval: 5s
      timeout: 5s
      retries: 5

  adminer:
    image: adminer:latest
    ports:
      - "8080:8080"
    depends_on:
      - postgres

volumes:
  postgres_data:
